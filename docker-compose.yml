services:
  db:
    image: postgres:16-alpine
    container_name: consumable-shelf-db
    restart: unless-stopped
    ports:
      - "15212:5432"
    environment:
      POSTGRES_DB: smes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-'&xinkeji!@#'}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consumable-shelf-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: '智能物料管理系统'
      APP_VERSION: "1.0.0"
      API_PREFIX: /api
      DATABASE_URL: postgresql+asyncpg://postgres:${PG_PASSWORD:-%26xinkeji%21%40%23}@db:5432/smes
      XR_MATCH_WINDOW_SECONDS: ${XR_MATCH_WINDOW_SECONDS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      BACKUP_DIR: /app/backups
      BACKUP_DB_HOST: db
      BACKUP_DB_PORT: 5432
      BACKUP_DB_NAME: smes
      BACKUP_DB_USER: postgres
      BACKUP_DB_PASSWORD: ${PG_PASSWORD:-'&xinkeji!@#'}
    volumes:
      - backup-data:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost', 8080); c.request('GET', '/health'); r = c.getresponse(); exit(0) if r.status == 200 else exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - smes

  gateway:
    image: nginx:alpine
    container_name: smes-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - backend
    networks:
      - smes

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: consumable-shelf-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - smes

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: consumable-shelf-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-'&xinkeji!@#'}
      PGADMIN_DISABLE_LOGIN: "False"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smes

volumes:
  pgdata:
  pgadmin-data:
  backup-data:

networks:
  smes:
    driver: bridge
