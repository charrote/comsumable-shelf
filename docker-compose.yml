services:
  db:
    image: postgres:16-alpine
    container_name: consumable-shelf-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consumable-shelf-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: '智能物料管理系统'
      APP_VERSION: "1.0.0"
      API_PREFIX: /api
      DATABASE_URL: postgresql+asyncpg://postgres:${PG_PASSWORD:-postgres}@db:5432/smes
      MASTER_IP: ${MASTER_IP:-host.docker.internal}
      MASTER_PORT: ${MASTER_PORT:-502}
      MASTER_STATION: ${MASTER_STATION:-200}
      LED_PROTOCOL: ${LED_PROTOCOL:-protocol2}
      SLOT_BITS_PER_BOARD: ${SLOT_BITS_PER_BOARD:-20}
      XR_MATCH_WINDOW_SECONDS: ${XR_MATCH_WINDOW_SECONDS:-10}
      LED_WORKER_COUNT: ${LED_WORKER_COUNT:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost', 8080); c.request('GET', '/health'); r = c.getresponse(); exit(0) if r.status == 200 else exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - smes

  gateway:
    image: nginx:alpine
    container_name: smes-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - smes

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: consumable-shelf-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - smes

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: consumable-shelf-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_DISABLE_LOGIN: "False"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smes

volumes:
  pgdata:
  pgadmin-data:

networks:
  smes:
    driver: bridge
